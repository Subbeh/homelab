          62393732386638643561

pihole_server:
  vmid: 200
  name: pihole
  node: "{{ groups['pve'][0] }}"
  template: debian
  template_version: 11
  template_storage: nas
  # network
  ip_address: "{{ network_svc.dns.ip }}/32"
  gateway: "{{ network_cidr.dns | ansible.utils.nthhost(1) }}"
  vlan_tag: 100
  network_bridge: vmbr0
  # resources
  storage: local-lvm
  memory: 1024
  cores: 1

pihole_setupvars: |
  INSTALL_WEB_INTERFACE=true
  WEBPASSWORD={{ pihole_api }}
  PIHOLE_INTERFACE=eth0
  QUERY_LOGGING=true
  BLOCKING_ENABLED=true
  TEMPERATUREUNIT=C
  DNSMASQ_LISTENING=all
  DNS_FQDN_REQUIRED=true
  DNS_BOGUS_PRIV=true
  DNSSEC=true
  REV_SERVER=true
  REV_SERVER_CIDR={{ network_cidr.lan }}
  REV_SERVER_TARGET={{ network_cidr.dns | ansible.utils.nthhost(1) }}
  REV_SERVER_DOMAIN={{ network_domain.tld_local }}
  PIHOLE_DNS_1=1.1.1.1
  PIHOLE_DNS_2=1.0.0.1

pihole_dnsmasq: |
  local=/{{ network_domain.tld_local }}/
  server=/vps.{{ network_domain.tld }}/1.1.1.1
  address=/k8s.{{ network_domain.tld }}/{{ network_k8s.ingress }}
  address=/{{ network_domain.tld }}/{{ network_svc.bastion.ip }}
