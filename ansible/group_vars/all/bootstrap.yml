---
bootstrap_pkg:
  - acl
  - apt-transport-https
  - bash-completion
  - cron
  - curl
  - debian-archive-keyring
  - dnsutils
  - gawk
  - git
  - hping3
  - htop
  - iperf3
  - iputils-ping
  - jq
  - locales
  - lsb-release
  - lsof
  - netcat-openbsd
  - net-tools
  - nfs-common
  - nmon
  - rsync
  - strace
  - sudo
  - tmux
  - traceroute
  - tree
  - unzip
  - vim
  - yq
  - zip

bootstrap_sys_grub_config: {}
bootstrap_sys_kernel_modules: []
bootstrap_sys_locales:
  - "{{ common_locale }}"

bootstrap_user: "{{ common_user }}"
bootstrap_users:
  - name: "{{ common_user }}"
    password: "{{ common_pass }}"
    home: true
    uid: "{{ common_user_id }}"
    sudoers: true

bootstrap_net_hostname: "{{ ansible_hostname }}"
bootstrap_net_dns_server: "{{ (ansible_host + '/24') | ansible.utils.nthhost(1) }}"
bootstrap_net_dns_domain: "{{ net_domain.tld_local }}"
bootstrap_net_dns_search: "{{ net_domain.tld_local }}"
bootstrap_net_ntp_server: "{{ (ansible_host + '/24') | ansible.utils.nthhost(1) }}"
bootstrap_net_ntp_timezone: "{{ common_timezone }}"

bootstrap_profile_users:
  - root
  - "{{ bootstrap_user }}"
bootstrap_profile_defaults:
  - editor: /usr/bin/vim

bootstrap_ssh_authorizedkeys:
  - "{{ vault_ssh_keys.pub.master }}"
bootstrap_sshd_config:
  PermitRootLogin: "no"
  ChallengeResponseAuthentication: "no"
  PermitEmptyPasswords: "no"
  UsePAM: "no"
  AuthenticationMethods: publickey
  PubkeyAuthentication: "yes"
  PasswordAuthentication: "no"
  MaxAuthTries: 3
  Protocol: 2
  UseDNS: "no"

bootstrap_docker_gid: "{{ common_group_id_docker }}"
bootstrap_docker_app_data: "{{ common_apps_dir }}"
