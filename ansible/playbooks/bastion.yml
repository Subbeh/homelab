---

- hosts: bastion
  gather_facts: false
  become: true

  vars:
    security_ssh_port: 3322
    firewall_allowed_tcp_ports:
      - 22
      - 3322
      - 80
      - 443
      - "{{ network_svc.portainer.agent_port }}"
    firewall_allowed_udp_ports:
      - 4242  # syslog
      - 41641 # tailscale
      - 3478  # tailscale

    borg_source_directories:
      - '{{ common_dir }}'
    borgmatic_cron_hour: 02
    borgmatic_cron_minute: 00

  pre_tasks:
    - name: Verify SSH port
      tags: [ always, pretasks ]
      ansible.builtin.import_tasks:
        file: ../tasks/ssh_port.yml
      vars:
        ansible_become: false

    - name: Gathering facts
      tags: always
      ansible.builtin.setup:

  handlers:
    - name: Import common handlers
      ansible.builtin.import_tasks: ../tasks/handlers.yml

  tasks:
    - name: Import bootstrap role
      tags: bootstrap
      ansible.builtin.import_role:
        name: bootstrap

    - name: Enable firewall
      tags: firewall
      ansible.builtin.import_role:
        name: geerlingguy.firewall

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Import Borg backups role
      tags: borg
      ansible.builtin.import_role:
        name: borg

    - name: Restart Docker service
      tags: [ firewall, docker ]
      ansible.builtin.service:
        name: docker
        state: restarted
      changed_when: false

    - name: Create Portainer agent container
      tags: portainer-agent
      ansible.builtin.include_role:
        name: apps
      vars:
        run_app: portainer_agent_bastion

    - name: Import Traefik role
      tags: traefik
      ansible.builtin.import_role:
        name: traefik

    - name: Copy dynamic Traefik config files
      tags: [ never, traefik-config ]
      ansible.builtin.import_role:
        name: traefik
        tasks_from: copy_config

    - name: Create Endlessh container
      tags: endlessh
      ansible.builtin.include_role:
        name: apps
      vars:
        run_app: endlessh

    - name: Import CrowdSec role
      tags: crowdsec
      ansible.builtin.import_role:
        name: crowdsec

    - name: Set sysctls
      tags: tailscale
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        reload: true
      with_dict: "{{ sysctl_config }}"
      vars:
        sysctl_config:
          net.ipv4.ip_forward: 1
          net.ipv6.conf.all.forwarding: 1

    - name: Import Tailscale role
      tags: tailscale
      ansible.builtin.import_role:
        name: artis3n.tailscale
      vars:
        tailscale_authkey: "{{ network_svc.tailscale.key }}"
        tailscale_args: "--hostname=bastion --accept-routes=true --advertise-routes=10.0.0.0/8 --advertise-exit-node"
