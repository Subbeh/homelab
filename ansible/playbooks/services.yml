---

- hosts: services
  gather_facts: false
  become: true

  vars:
    docker_users:
      - "{{ common_user }}"

    packages_custom:
      - postgres-client

    borgbase_repo: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          62333136623031396539616237383035646137363338633432373535333635643638653866343761
          3163613331366361343335613165663431656366313864330a663565386435323361363230303332
          63363363633766313165383031393639396561343661306130353235613131333433653532613265
          3162323062326635310a666533346361326439386231323332343132386338353061666264376339
          37303237303266366337653632626462313066623539376531323633363332653730306135336334
          32363230653761396462663031353735336637313765343065366234313338663237636132313733
          633332633462366562646438346465656563
    borg_repository:
      - path: "{{ borg_server }}/apps-services"
        label: local
      - path: "{{ borgbase_repo }}"
        label: borgbase
    borg_source_directories:
      - '{{ common_dir }}'
    borg_hc_ping_url: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          38643637643233373763663236363263653262646230653731393537633133303839383361376331
          3236343066313039303163383834666535346533383735320a326463633532336339636231353338
          65333032386139653931353333643262313332666633636362656238333136353233393939643331
          3637666536363562620a643863386438313031373232636335346437373562303338343235326632
          30393538326234363362316565623738356531626235616262613339353530646564393333663133
          39613237393565666463303861393463366262346535336636326561633530376133326135313931
          626337333138313462373335316366666536
    borgmatic_timer_hour: 02
    borgmatic_timer_minute: 20
    borgmatic_hooks:
      before_backup:
        - echo "$(date) - Starting backup."
      after_backup:
        - echo "$(date) - Backup created."
      on_error:
        - echo "$(date) - Error while creating a backup."
      postgresql_databases:
        - name: all
          hostname: localhost
          username: "{{ common_user }}"
          password: "{{ postgres_pass }}"
      healthchecks:
        ping_url: "{{ borg_hc_ping_url }}"

  pre_tasks:
    - name: Verify SSH port
      tags: [ always, pretasks ]
      ansible.builtin.import_tasks:
        file: ../tasks/check_port.yml
      vars:
        ansible_become: false

    - name: Gathering facts
      tags: always
      ansible.builtin.setup:

  handlers:
    - name: Import common handlers
      ansible.builtin.import_tasks: ../tasks/handlers.yml

  tasks:
    - name: Import bootstrap role
      tags: bootstrap
      ansible.builtin.import_role:
        name: bootstrap

    - name: Install Docker
      tags: docker
      ansible.builtin.import_role:
        name: geerlingguy.docker

    - name: Import Borg backups role
      tags: borg
      ansible.builtin.import_role:
        name: borg

    - name: Import Authentik role
      tags: authentik
      ansible.builtin.import_role:
        name: authentik

    - name: Deploy containers
      tags: apps
      ansible.builtin.include_role:
        name: apps
        apply:
          tags: always
      vars:
        run_app: "{{ item }}"
      with_items:
        - postgres
        - redis
        - portainer
        - gitea
        - overseerr
        - tautulli
        - openspeedtest
        - uptimekuma
        - wizarr
