---
- hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Gathering facts
      tags: always
      ansible.builtin.setup:
      when:
        - inventory_hostname != 'localhost'
        - inventory_hostname != 'ansible_controller_fqdn'

  vars:
    reboot_servers: {}

  tasks:

    - block:
        - name: Sync time
          tags: always
          ansible.builtin.command: hwclock --hctosys
          failed_when: false
          changed_when: false

        - name: Update repo and cache
          tags: always
          ansible.builtin.apt: update_cache=yes force_apt_get=yes
          changed_when: false

        - name: Update packages
          tags: always
          ansible.builtin.apt: upgrade=dist force_apt_get=yes

        - name: Include check_reboot task
          tags: [ reboot, force ]
          ansible.builtin.include_tasks:
            file: ../tasks/check_reboot.yml

        - name: Clean up system
          tags: [ never, clean ]
          block:
            - name: Remove useless packages from the cache
              ansible.builtin.apt:
                autoclean: true

            - name: Remove dependencies that are no longer required
              ansible.builtin.apt:
                autoremove: true

            - name: Run the equivalent of "apt-get clean" as a separate step
              ansible.builtin.apt:
                clean: true

      when:
        - (ansible_os_family is defined) and (ansible_os_family == "Debian")
        - inventory_hostname != 'localhost'
        - inventory_hostname != 'ansible_controller_fqdn'
