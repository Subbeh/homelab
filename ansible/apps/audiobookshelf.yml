---

audiobookshelf:
  image: ghcr.io/advplyr/audiobookshelf:2.2.19
  ports:
    - "{{ network_svc.nas_srv.ip }}:{{ network_svc.audiobookshelf.port }}:80"
  volumes:
    - "{{ common_dir }}/audiobookshelf/config:/config"
    - "{{ common_dir }}/audiobookshelf/metadata:/metadata"
    - "{{ common_media_dir }}:/data"

  traefik:
    port: "{{ network_svc.audiobookshelf.port }}"
    rtr_middlewares:
      - chain-no-auth
