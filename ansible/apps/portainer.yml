---
portainer:
  container:
    image: portainer/portainer-ce:2.19.3
    command: "-H unix:///var/run/docker.sock"
    ports:
      - "{{ net_svc.portainer.port }}:9000"
      # - "{{ net_svc.portainer.port_agent }}:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "{{ common_apps_dir }}/portainer/data:/data"

  traefik:

  uptime:
    - name: portainer
      type: group
      group: services
    - name: portainer-server
      group: portainer

portainer_agent_bastion:
  name: portainer-agent
  container:
    image: portainer/agent:2.19.4
    ports:
      - "{{ net_svc.portainer.port_agent }}:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/lib/docker/volumes:/var/lib/docker/volumes"

  uptime:
    group: portainer
    type: port
    port: "{{ net_svc.portainer.port_agent }}"

portainer_agent_plex:
  name: portainer-agent
  container:
    image: portainer/agent:2.19.4
    ports:
      - "{{ net_svc.portainer.port_agent }}:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/lib/docker/volumes:/var/lib/docker/volumes"

  uptime:
    group: portainer
    type: port
    port: "{{ net_svc.portainer.port_agent }}"
