---
traefik:
  container:
    image: traefik:v2.10.4
    restart_policy: always
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "{{ common_dir }}/logs/traefik:/logs"
      - "{{ common_dir }}/traefik/configs:/configs"
      - "{{ common_dir }}/traefik/traefik.yaml:/traefik.yaml"
      - "{{ common_dir }}/traefik/acme.json:/acme.json"
      - "{{ common_dir }}/traefik/pve.pem:/pve.pem"
      - "{{ common_dir }}/traefik/.htpasswd:/.htpasswd"
    env:
      CF_API_EMAIL: "{{ cloudflare_email }}"
      CF_API_KEY: "{{ cloudflare_api_global }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-rtr.entrypoints: "websecure"
      traefik.http.routers.traefik-rtr.rule: "Host(`traefik.{{ network_domain.tld }}`)"
      traefik.http.routers.traefik-rtr.tls.certresolver: "dns-cloudflare"
      traefik.http.routers.traefik-rtr.tls.domains[0].main: "{{ network_domain.tld }}"
      traefik.http.routers.traefik-rtr.tls.domains[0].sans: "*.{{ network_domain.tld }}"
      traefik.http.routers.traefik-rtr.service: "api@internal"
      traefik.http.routers.traefik-rtr.middlewares: "chain-internal@file"

  dependents:
    - redis_traefik_cs
    - whoami

  uptime:
    group: system
    type: port
    port: "443"

redis_traefik_cs:
  name: redis-traefik-cs
  container:
    image: redis:7-alpine
    volumes:
      - "{{ common_dir }}/traefik/db:/data"
    command: "redis-server --requirepass {{ vault_redis_cs_pass }}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s

whoami:
  container:
    image: traefik/whoami
    labels:
      traefik.enable: "true"
      traefik.http.routers.whoami-rtr.rule: "Host(`whoami.{{ network_domain.tld }}`)"
      traefik.http.routers.whoami-rtr.entrypoints: "websecure"
      traefik.http.routers.whoami-rtr.middlewares: "chain-external-no-auth@file"

traefik_test:
  traefik:
    name: test
    url: "http://whoami"
    rtr-middlewares:
      - crowdsec
      - cloudflarewarp
