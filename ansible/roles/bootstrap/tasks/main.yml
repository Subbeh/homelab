---

- ansible.builtin.import_tasks: prereq.yml
  tags: prereq

- ansible.builtin.import_tasks: apt.yml
  tags: apt

- ansible.builtin.import_tasks: hostname.yml
  tags: hostname

- ansible.builtin.import_tasks: dotfiles.yml
  tags: dotfiles

- ansible.builtin.import_tasks: defaults.yml
  tags: defaults

- ansible.builtin.import_tasks: ssh.yml
  tags: ssh

- ansible.builtin.import_role:
    name: geerlingguy.security
  tags: security

- name: Flush handlers, reset connection and reset SSH port
  block:
    - ansible.builtin.set_fact:
        ansible_user: "{{ common_user }}"
    - ansible.builtin.meta: flush_handlers
    - ansible.builtin.meta: reset_connection
    - ansible.builtin.include_tasks: ../tasks/ssh_port.yml
      vars:
        ansible_become: false

- ansible.builtin.import_tasks: docker.yml
  tags: docker
