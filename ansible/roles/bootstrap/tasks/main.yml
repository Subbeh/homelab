---
- name: Run prerequisites task
  ansible.builtin.include_tasks: prereq.yml

- name: Run package task
  ansible.builtin.include_tasks: packages.yml
  when: bootstrap.packages is true

- name: Run system task
  ansible.builtin.include_tasks: system.yml
  when: bootstrap.system is true

- name: Run user task
  ansible.builtin.include_tasks: user.yml
  when: bootstrap.user is true

- name: Run network task
  ansible.builtin.include_tasks: network.yml
  when: bootstrap.network is true

- name: Run ntp task
  ansible.builtin.include_tasks: ntp.yml
  when: bootstrap.ntp is true

- name: Run filesystem task
  ansible.builtin.include_tasks: filesystem.yml
  when: bootstrap.filesystem is true

- name: Run profile task
  ansible.builtin.include_tasks: profile.yml
  when: bootstrap.profile is true

- name: Run locales task
  ansible.builtin.include_tasks: locale.yml
  when: bootstrap.locale is true
