---
- name: Ensure user is created
  ansible.builtin.user:
    name: "{{ bootstrap_user.name }}"
    createhome: true
    password: "{{ bootstrap_user.password | string | password_hash('sha512', 'mysecretsalt') }}"
    shell: /bin/bash
    state: present

- name: Add user to sudoers
  ansible.builtin.copy:
    content: "{{ bootstrap_user.name }} ALL=(ALL:ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ bootstrap_user.name }}_nopasswd"
    mode: 0440

- name: Silence the login prompt
  ansible.builtin.file:
    dest: "/home/{{ bootstrap_user.name }}/.hushlogin"
    state: touch
    owner: "{{ bootstrap_user.name }}"
    mode: 0775
    modification_time: preserve
    access_time: preserve
