---
- name: Set authorized keys
  ansible.posix.authorized_key:
    user: "{{ bootstrap_user.name }}"
    key: "{{ item }}"
    state: present
  loop: "{{ bootstrap_ssh_authorizedkeys }}"

- name: Generate root OpenSSH keypair
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
  register: _setup_root_ssh_key

- name: Allow root self-SSH
  ansible.posix.authorized_key:
    user: "root"
    state: present
    key: "{{ _setup_root_ssh_key.public_key }}"

- name: Generate user OpenSSH keypair
  community.crypto.openssh_keypair:
    path: "/home/{{ bootstrap.user.name }}/.ssh/id_ed25519"
    type: ed25519
    owner: "{{ bootstrap.user.name }}"
    group: "{{ bootstrap.user.name }}"
  register: _setup_user_ssh_key

- name: Allow user self-SSH
  ansible.posix.authorized_key:
    user: "{{ bootstrap.user.name }}"
    state: present
    key: "{{ _setup_user_ssh_key.public_key }}"

- name: Configure sshd
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    regex: "^(#)?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
  with_dict: "{{ bootstrap.ssh.config }}"
  notify:
    - restart sshd
