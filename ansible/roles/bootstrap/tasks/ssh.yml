---
- name: Set authorized keys
  ansible.posix.authorized_key:
    user: "{{ _def_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ bootstrap_ssh_authorizedkeys }}"

- name: Generate root OpenSSH keypair
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
  register: _setup_root_ssh_key

- name: Allow root self-SSH
  ansible.posix.authorized_key:
    user: "root"
    state: present
    key: "{{ _setup_root_ssh_key.public_key }}"

- name: Generate user OpenSSH keypair
  community.crypto.openssh_keypair:
    path: "{{ _def_user_home }}/.ssh/id_ed25519"
    type: ed25519
    owner: "{{ _def_user }}"
    group: "{{ _def_user }}"
  register: _setup_user_ssh_key

- name: Allow user self-SSH
  ansible.posix.authorized_key:
    user: "{{ _def_user }}"
    state: present
    key: "{{ _setup_user_ssh_key.public_key }}"

- name: Configure sshd
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    regex: "^(#)?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
  with_dict: "{{ bootstrap_sshd_config }}"
  notify:
    - change ansible_user
    - restart sshd

# https://bugs.launchpad.net/ubuntu/+source/openssh/+bug/45234
- name: Fix - create cron job to create /run/sshd on reboot
  ansible.builtin.cron:
    name: "fix sshd service"
    special_time: reboot
    job: "mkdir -p -m0755 /run/sshd && systemctl restart ssh.service"
    user: root
    cron_file: sshd_fix
