---

- name: Restart chronyd to sync time
  ansible.builtin.service:
    name: chronyd
    state: restarted
  when: ansible_distribution == "Debian"
  failed_when: false

- name: Restart systemd-timesyncd to sync time
  ansible.builtin.service:
    name: systemd-timesyncd
    state: restarted
  when: ansible_distribution == "Ubuntu"
  failed_when: false

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"
    hwclock: "local"

- name: Set defaults
  community.general.alternatives:
    name: editor
    path: /usr/bin/vim
