---
- name: Uninstall packages
  ansible.builtin.apt:
    pkg: "{{ bootstrap_pkg_rm }}"
    state: absent
    autoremove: true

- name: Update repo and cache
  ansible.builtin.apt:
    update_cache: yes
    force_apt_get: yes
  changed_when: false

- name: Update packages
  ansible.builtin.apt:
    upgrade: dist
    force_apt_get: yes

- name: Install packages
  ansible.builtin.apt:
    name: "{{ lookup('flattened', bootstrap_pkg_extra, bootstrap_pkg) }}"
    state: present
    install_recommends: false

- name: Gather installed packages
  ansible.builtin.package_facts:
    manager: auto

- name: Install Python pip packages
  ansible.builtin.import_role:
    name: geerlingguy.pip
  vars:
    pip_install_packages: "{{ lookup('flattened', bootstrap_pkg_pip_extra, bootstrap_pkg_pip) }}"

- block:
    - name: Install Intel microcode if needed
      ansible.builtin.apt:
        pkg: intel-microcode
        state: present
        default_release: "{{ ansible_distribution_release }}"
      when: >
        ansible_processor[0].find('Intel') != -1 and
        ansible_architecture == 'x86_64'

    - name: Install AMD microcode if needed
      ansible.builtin.apt:
        pkg: amd64-microcode
        state: present
        default_release: "{{ ansible_distribution_release }}"
      when: >
        ansible_processor[0].find('AMD') != -1 and
        ansible_architecture == 'x86_64'
  when: bootstrap_pkg_microcode is true

- block:
    - name: Enable unattended-upgrades
      ansible.builtin.apt:
        pkg: unattended-upgrades
        state: present

    - name: Configure unattended-upgrades
      ansible.builtin.lineinfile:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        state: present
        regex: "^{{ item.key }}"
        line: "{{ item.key }} {{ item.value }};"
        validate: "echo %s && unattended-upgrades --dry-run"
      loop: "{{ items | dict2items }}"
      vars:
        items:
          "Unattended-Upgrade::MinimalSteps": "true"
          "Unattended-Upgrade::Remove-Unused-Kernel-Packages": "true"
          "Unattended-Upgrade::Remove-New-Unused-Dependencies": "true"
          "Unattended-Upgrade::Remove-Unused-Dependencies": "true"
      changed_when: false
  when: bootstrap_pkg_unattended_upgrades is true

- name: Clean up system
  block:
    - name: Remove useless packages from the cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove dependencies that are no longer required
      ansible.builtin.apt:
        autoremove: true

    - name: Run the equivalent of "apt-get clean" as a separate step
      ansible.builtin.apt:
        clean: true

- name: Check if the reboot-required file exists
  tags: always
  ansible.builtin.stat: path=/var/run/reboot-required get_md5=no
  register: reboot_required_file
  notify: Check reboot
