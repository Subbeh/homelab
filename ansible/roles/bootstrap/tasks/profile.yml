---
- name: Copy profile config files over
  ansible.builtin.copy:
    src: "{{ item.0.file }}"
    dest: "{{ '/root' if item.1 == 'root' else '/home/' + item.1 }}/{{ item.0.dest }}"
    mode: 0640
    owner: "{{ item.1 }}"
    group: "{{ item.1 }}"
  with_subelements:
    - "{{ bootstrap_profile_config }}"
    - user

- name: Set app defaults
  community.general.alternatives:
    name: "{{ item.key }}"
    path: "{{ item.value }}"
  with_dict: "{{ bootstrap_profile_defaults }}"
