---
- name: Check directories exist
  ansible.builtin.stat:
    path: "{{ item.src }}"
  loop: "{{ bootstrap_nfs_mounts }}"
  register: _fs_dirs
  when: _bts.nfs_mounts

- name: Create directories
  ansible.builtin.file:
    path: "{{ item.item }}"
    state: directory
    mode: "0771"
  loop: "{{ _fs_dirs.results }}"
  when:
    - _bts.nfs_mounts
    - item.stat.exists is false

- name: Mount NFS shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.dest }}"
    opts: rw,sync,hard
    state: mounted
    fstype: nfs
  loop: "{{ bootstrap_fs_mounts }}"
  when: _bts.nfs_mounts
