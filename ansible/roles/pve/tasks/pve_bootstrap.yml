---
- name: Disable Enterprise Repository
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^(deb .*[\s\-]enterprise)'
    replace: '# \1'
  loop:
    - "/etc/apt/sources.list.d/pve-enterprise.list"
    - "/etc/apt/sources.list.d/ceph.list"

- name: Enable High Availability
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - pve-ha-lrm
    - pve-ha-crm
    - corosync

- name: Enable powersave mode
  ansible.builtin.cron:
    name: "enable powersave mode"
    special_time: reboot
    job: 'echo "conservative" | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'
    cron_file: powersave
