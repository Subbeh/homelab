---
- name: Set traefik facts
  ansible.builtin.set_fact:
    traefik_config: "{{ _app_config.traefik }}"

- name: Create Traefik config for {{ _app }}
  delegate_to: "{{ network_svc.traefik.host }}"
  become: true
  ansible.builtin.template:
    src: traefik-app.yml.j2
    dest: "{{ hostvars[network_svc.traefik.host].common_dir }}/traefik/configs/app-{{ _app_name }}.yml"
