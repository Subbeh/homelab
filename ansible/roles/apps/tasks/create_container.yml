---
- name: Set container facts
  no_log: "{{ ci | default(false) }}"
  ansible.builtin.set_fact:
    _container: "{{ _defaults.container | ansible.builtin.combine(_app_config.container, list_merge='append_rp', recursive=true) }}"

- name: Set container name fact
  no_log: "{{ ci | default(false) }}"
  ansible.builtin.set_fact:
    _container: "{{ _container | combine({'name': _app_name}) }}"

- name: Set container host
  ansible.builtin.set_fact:
    _remote_host: "{{ net_svc[_app].host | mandatory }}"

- name: Ensure Docker network is present on {{ _remote_host }}
  no_log: "{{ ci | default(false) }}"
  delegate_to: "{{ _remote_host }}"
  community.docker.docker_network:
    name: "{{ item.name }}"
    driver: "{{ _defaults.networks[item.name].driver }}"
    driver_options: "{{ _defaults.networks[item.name].driver_options | default(omit) }}"
    ipam_config: "{{ _defaults.networks[item.name].ipam_config | default(omit) }}"
  with_items: "{{ _container.networks }}"
  when: _container.network_mode is undefined

- name: Create container {{ _container.name }}
  no_log: "{{ ci | default(false) }}"
  delegate_to: "{{ _remote_host }}"
  community.docker.docker_container:
    name: "{{ _container.name | default(omit) }}"
    image: "{{ _container.image | default(omit) }}"
    networks: "{{ _container.networks if _container.net_mode is undefined else omit }}"
    volumes: "{{ _container.volumes | default(omit) }}"

    api_version: "{{ _container.api_version | default(omit) }}"
    docker_api_version: "{{ _container.docker_api_version | default(omit) }}"
    auto_remove: "{{ _container.auto_remove | default(omit) }}"
    blkio_weight: "{{ _container.blkio_weight | default(omit) }}"
    ca_cert: "{{ _container.ca_cert | default(omit) }}"
    tls_ca_cert: "{{ _container.tls_ca_cert | default(omit) }}"
    cacert_path: "{{ _container.cacert_path | default(omit) }}"
    cap_drop: "{{ _container.cap_drop | default(omit) }}"
    capabilities: "{{ _container.capabilities | default(omit) }}"
    cgroup_parent: "{{ _container.cgroup_parent | default(omit) }}"
    cgroupns_mode: "{{ _container.cgroupns_mode | default(omit) }}"
    cleanup: "{{ _container.cleanup | default(omit) }}"
    client_cert: "{{ _container.client_cert | default(omit) }}"
    tls_client_cert: "{{ _container.tls_client_cert | default(omit) }}"
    cert_path: "{{ _container.cert_path | default(omit) }}"
    client_key: "{{ _container.client_key | default(omit) }}"
    tls_client_key: "{{ _container.tls_client_key | default(omit) }}"
    key_path: "{{ _container.key_path | default(omit) }}"
    command: "{{ _container.command | default(omit) }}"
    command_handling: "{{ _container.command_handling | default(omit) }}"
    comparisons: "{{ _container.comparisons | default(omit) }}"
    container_default_behavior: "{{ _container.container_default_behavior | default(omit) }}"
    cpu_period: "{{ _container.cpu_period | default(omit) }}"
    cpu_quota: "{{ _container.cpu_quota | default(omit) }}"
    cpu_shares: "{{ _container.cpu_shares | default(omit) }}"
    cpus: "{{ _container.cpus | default(omit) }}"
    cpuset_cpus: "{{ _container.cpuset_cpus | default(omit) }}"
    cpuset_mems: "{{ _container.cpuset_mems | default(omit) }}"
    debug: "{{ _container.debug | default(omit) }}"
    default_host_ip: "{{ _container.default_host_ip | default(omit) }}"
    detach: "{{ _container.detach | default(omit) }}"
    device_read_bps: "{{ _container.device_read_bps | default(omit) }}"
    device_read_iops: "{{ _container.device_read_iops | default(omit) }}"
    device_requests: "{{ _container.device_requests | default(omit) }}"
    device_write_bps: "{{ _container.device_write_bps | default(omit) }}"
    device_write_iops: "{{ _container.device_write_iops | default(omit) }}"
    devices: "{{ _container.devices | default(omit) }}"
