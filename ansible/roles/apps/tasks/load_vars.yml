---

- name: load all container manifests
  ansible.builtin.include_vars:
    dir: "{{ common_ansible_root }}/apps"
    extensions:
      - "yml"
    ignore_unknown_extensions: true
    name: containers
  no_log: true

- name: Set container variables
  ansible.builtin.set_fact:
    container: "{{ containers[run_container] | combine({'name': containers[run_container].name | default(run_container)}) }}"
  when: run_container is defined
