---
version: "3"

tasks:
  default:
    desc: Run app role
    vars:
      TAGS: 'untagged,{{default "all" .TAGS}}'
    cmds:
      - ansible-playbook {{.ANSIBLE_PLAYBOOK_DIR}}/test.yml -e 'app="{{.CLI_ARGS}}"' --tags {{.TAGS}}

  container:
    desc: Create container
    cmds:
      - task: default
        vars: { TAGS: "container,db" }

  db:
    desc: Create database
    cmds:
      - task: default
        vars: { TAGS: "db" }

  traefik:
    desc: Create Traefik config
    cmds:
      - task: default
        vars: { TAGS: "traefik" }

  uptime:
    desc: Create Uptime Kuma config
    cmds:
      - task: default
        vars: { TAGS: "uptime" }

  files:
    desc: Copy app files over
    cmds:
      - task: default
        vars: { TAGS: "files" }

  config:
    desc: Create app configs
    cmds:
      - task: default
        vars: { TAGS: "traefik,uptime,files" }
