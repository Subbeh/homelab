apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    namespace: cert-manager
    repo: https://charts.jetstack.io
    valuesFile: values.yaml
    version: v1.11.1

resources:
  - namespace.yaml
  - external-secrets.yaml
  - clusterissuer-prd.yaml
  - certificate-prd.yaml
