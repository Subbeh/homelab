---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k8s-sbbh-cloud-stg
  namespace: default
spec:
  secretName: k8s-sbbh-cloud-stg-tls
  issuerRef:
    name: letsencrypt-stg
    kind: ClusterIssuer
  commonName: "*.k8s.sbbh.cloud"
  dnsNames:
    - "k8s.sbbh.cloud"
    - "*.k8s.sbbh.cloud"
