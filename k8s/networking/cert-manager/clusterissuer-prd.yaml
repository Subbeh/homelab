---

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prd
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: steven001@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prd
    solvers:
      - dns01:
          cloudflare:
            email: steven001@gmail.com
            apiTokenSecretRef:
              name: doppler-cert-manager
              key: CM_CLOUDFLARE_TOKEN
        selector:
          dnsZones:
            - "sbbh.cloud"

