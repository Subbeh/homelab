apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 5.45.1
    valuesFile: values.yaml
    namespace: argocd
    includeCRDs: true

generators:
  - secret-generator.yaml

resources:
  - namespace.yaml
  - externalsecret.yaml
  - ingressroute.yaml
  - app-project.yaml
  - argocd-app.yaml
  - apps.yaml

patches:
  - path: patches/argocd-cmd-params-cm.yaml
  - path: patches/argocd-cm.yaml
