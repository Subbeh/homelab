---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: steven001@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            email: steven001@gmail.com
            apiTokenSecretRef:
              name: cert-manager-doppler-secret
              key: CLOUDFLARE_TOKEN
        selector:
          dnsZones:
            - "sbbh.cloud"
