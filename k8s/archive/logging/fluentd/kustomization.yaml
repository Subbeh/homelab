apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: logging

helmCharts:
  - name: fluentd
    repo: https://fluent.github.io/helm-charts
    version: 0.3.9
    valuesFile: values.yaml
    namespace: logging
    releaseName: fluentd
    includeCRDs: true

resources:
  - certificate.yaml
  - cm-template.yaml
  - service-ext.yaml
