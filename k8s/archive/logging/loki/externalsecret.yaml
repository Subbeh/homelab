apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-loki
  namespace: gitops
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets

  target:
    name: doppler-loki
    template:
      engineVersion: v2
      data:
        MINIO_ACCESS_KEY_ID: 'loki'
        MINIO_SECRET_ACCESS_KEY: '{{ .lokiPassword }}'

  dataFrom:
    - extract:
        key: MINIO_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
