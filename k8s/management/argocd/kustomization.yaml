---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 5.51.4
    valuesFile: values.yaml
    namespace: argocd
    includeCRDs: true

resources:
  - namespace.yaml
  - externalsecret-repo.yaml
  - appproject.yaml
  - apps.yaml
  - ingressroute.yaml

patches:
  - path: patches/argocd-cmd-params-cm.yaml
  - path: patches/argocd-cm.yaml
