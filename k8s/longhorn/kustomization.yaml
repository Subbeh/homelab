---

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn-system

helmCharts:
  - name: longhorn
    releaseName: longhorn
    namespace: longhorn-system
    repo: https://charts.longhorn.io
    version: v1.4.1
    valuesFile: values.yaml

resources:
  - namespace.yaml
  - external-secrets.yaml
  - ingress-route.yaml
  - jobs/snapshots.yaml
  - jobs/backups.yaml
