apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: storage

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.5.1
    valuesFile: values.yaml
    namespace: storage
    releaseName: longhorn
    includeCRDs: true

resources:
  - externalsecret.yaml
  - ingressroute.yaml
  - recurringjob-snapshots.yaml
  - recurringjob-backups.yaml
