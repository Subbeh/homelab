apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-drone
  namespace: gitops
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets

  target:
    name: doppler-drone

  dataFrom:
    - extract:
        key: DRONE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
    - extract:
        key: DOCKER_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
    - extract:
        key: GITHUB_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
    - extract:
        key: GITEA_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
    - extract:
        key: ANSIBLE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
    - extract:
        key: RENOVATE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-postgres
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets

  target:
    name: doppler-postgres

  dataFrom:
    - extract:
        key: POSTGRES_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-db-secret
  namespace: gitops
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets

  target:
    name: doppler-db-secret
    template:
      engineVersion: v2
      data:
        username: "{{ .POSTGRES_USERNAME }}"
        password: "{{ .POSTGRES_PASSWORD }}"

  dataFrom:
    - extract:
        key: DRONE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-ssh-keys
  namespace: gitops
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-secrets

  target:
    name: doppler-ssh-keys
    template:
      engineVersion: v2
      data:
        ssh_host_ed25519_key: "{{ .DRONE_SSH_KEY }}"
        ssh_host_ed25519.key.pub: "{{ .DRONE_SSH_PUB_KEY }}"

  dataFrom:
    - extract:
        key: DRONE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
        decodingStrategy: None # ArgoCD sync issue
