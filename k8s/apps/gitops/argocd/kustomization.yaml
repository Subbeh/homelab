apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 5.34.5
    valuesFile: values.yaml
    namespace: gitops
    includeCRDs: true

generators:
  - secret-generator.yaml

resources:
  - namespace.yaml
  - externalsecret.yaml
  - ingressroute.yaml
  - applicationset.yaml

patches:
  - path: patches/argocd-cmd-params-cm.yaml
