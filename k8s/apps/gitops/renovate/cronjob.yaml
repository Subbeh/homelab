---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: '@daily'
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:35.137.0
              env:
                - name: LOG_LEVEL
                  value: debug
                - name: RENOVATE_DETECT_HOST_RULES_FROM_ENV
                  value: 'true'
                - name: RENOVATE_CONFIG_FILE
                  value: '/opt/renovate/config.json5'
              envFrom:
                - secretRef:
                    name: doppler-renovate
              volumeMounts:
                - name: config-volume
                  mountPath: /opt/renovate/
          restartPolicy: Never
          volumes:
            - name: config-volume
              configMap:
                name: renovate-config
