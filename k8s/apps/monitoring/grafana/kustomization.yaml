apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: grafana
    repo: https://grafana.github.io/helm-charts
    version: 6.59.0
    namespace: monitoring
    valuesFile: values.yaml
    releaseName: grafana
    includeCRDs: true

resources:
  - externalsecret.yaml
  - ingressroute.yaml
