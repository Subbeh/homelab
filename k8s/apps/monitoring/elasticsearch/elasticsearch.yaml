---

apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: efk
  namespace: monitoring
spec:
  version: 8.8.0
  http:    # Making elasticsearch service available from outisde the cluster
    tls:
      selfSignedCertificate:
        disabled: true
  auth:
    roles:
    - secretName: es-fluentd-roles
    - secretName: es-prometheus-roles
    fileRealm:
    - secretName: es-admin
    - secretName: es-fluentd
    - secretName: es-prometheus
  nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
            storageClassName: longhorn
      podTemplate:
        spec:
          # Enabling service account token. linkerd requirement
          automountServiceAccountToken: true
