apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 5.5.7
    valuesFile: values.yaml
    namespace: monitoring
    releaseName: loki
    includeCRDs: true

resources:
  - external-secret.yaml
  - ingress-route.yaml
