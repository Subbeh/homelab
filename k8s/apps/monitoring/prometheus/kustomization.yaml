apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 47.6.1
    namespace: monitoring
    valuesFile: values.yaml
    releaseName: kube-prometheus-stack
    includeCRDs: true

resources:
  - ingressroute.yaml
