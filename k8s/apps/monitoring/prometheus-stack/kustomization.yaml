apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 46.4.1
    namespace: monitoring
    valuesFile: values.yaml
    releaseName: kps
    includeCRDs: true

resources:
  - namespace.yaml
  - externalsecret.yaml
  - ingressroute.yaml
  - config/svc-k3s-metrics.yaml
  - config/rule-k3s.yaml
