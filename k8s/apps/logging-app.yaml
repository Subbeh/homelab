---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging
  namespace: argocd
spec:
  project: default
  sources:
      # Loki
    - chart: loki-distributed
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 0.69.11
      helm:
        values: |
          loki:
            # Disable multi-tenant support
            auth_enabled: false

            # S3 backend storage configuration
            storage:
              bucketNames:
                chunks: k3s-loki
                ruler: k3s-loki
              type: s3
              s3:
                endpoint: s3.k8s.sbbh.cloud
                region: eu-west-1
                secretAccessKey: ${MINIO_SECRET_ACCESS_KEY}
                accessKeyId: ${MINIO_ACCESS_KEY_ID}
                s3ForcePathStyle: true
                insecure: false
                http_config:
                  idle_conn_timeout: 90s
                  response_header_timeout: 0s
                  insecure_skip_verify: false

          # Configuration for the write
          write:
            # Number of replicas for the write
            replicas: 2
            persistence:
              # -- Size of persistent disk
              size: 10Gi
              # -- Storage class to be used.
              storageClass: longhorn

            # Enable environment variables in config file
            # https://grafana.com/docs/loki/latest/configuration/#use-environment-variables-in-the-configuration
            extraArgs:
              - '-config.expand-env=true'
            extraEnv:
              - name: MINIO_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: logging-doppler-secret
                    key: MINIO_ACCESS_KEY_ID
              - name: MINIO_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: logging-doppler-secret
                    key: MINIO_SECRET_ACCESS_KEY

          # Configuration for the read
          read:
            # Number of replicas for the read
            replicas: 2
            persistence:
              # -- Size of persistent disk
              size: 10Gi
              # -- Storage class to be used.
              storageClass: longhorn

            # Enable environment variables in config file
            # https://grafana.com/docs/loki/latest/configuration/#use-environment-variables-in-the-configuration
            extraArgs:
              - '-config.expand-env=true'
            extraEnv:
              - name: MINIO_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: logging-doppler-secret
                    key: MINIO_ACCESS_KEY_ID
              - name: MINIO_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: logging-doppler-secret
                    key: MINIO_SECRET_ACCESS_KEY

          # Configuration for the gateway
          gateway:
            # -- Specifies whether the gateway should be enabled
            enabled: true
            # -- Number of replicas for the gateway
            replicas: 1

          # Disable mino installation
          minio:
            enabled: false

          # Disable self-logging
          logging:
            selflogging:
              enabled: false
              grafanaAgent:
                installOperator: false
            lokiCanary:
                enabled: false

          # Disable helm-test
          test:
            enabled: false
      # Promtail
    - chart: promtail
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 6.10.0
      helm:
        values: |
          config:
            clients:
              - url: http://logging-loki-distributed-gateway/loki/api/v1/push
    - repoURL: https://git.sbbh.cloud/sysadm/homelab.git
      targetRevision: main
      path: k8s/logging
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    # automated:
    #   selfHeal: true
    #   prune: true
