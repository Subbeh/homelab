---

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    releaseName: external-secrets
    version: 0.8.2
    namespace: security
    valuesFile: values.yaml
    includeCRDs: true

generators:
  - secret-generator.yaml

resources:
  - namespace.yaml
  - secret-store.yaml
