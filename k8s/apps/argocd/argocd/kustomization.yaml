apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 5.33.0
    valuesFile: values.yaml
    namespace: argocd
    includeCRDs: true

generators:
  - secret-generator.yaml

resources:
  - namespace.yaml
  - external-secret.yaml
  - ingress-route.yaml
  - applicationset.yaml

patches:
  - path: patches/argocd-cmd-params-cm.yaml
