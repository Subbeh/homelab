apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: logging

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 5.5.7
    valuesFile: values.yaml
    namespace: logging
    releaseName: loki
    includeCRDs: true

resources:
  - externalsecret.yaml
  - ingressroute.yaml
