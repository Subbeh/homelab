---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.11.1
    valuesFile: values.yaml
    namespace: networking
    includeCRDs: true
    releaseName: cert-manager

resources:
  - external-secret.yaml
  - clusterissuer-prd.yaml
  - certificate-prd.yaml
