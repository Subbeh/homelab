---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: v22.0.0
    valuesFile: values.yaml
    namespace: networking
    includeCRDs: true
    releaseName: traefik

resources:
  - middlewares.yaml
  - tlsstore.yaml
  - ingress-route.yaml
  - metrics-service.yaml
