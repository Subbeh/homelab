---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: drone-db-secret
  namespace: gitops
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api

  target:
    name: drone-db-secret
    template:
      engineVersion: v2
      data:
        username: "{{ .POSTGRES_USERNAME }}"
        password: "{{ .POSTGRES_PASSWORD }}"

  dataFrom:
    - extract:
        key: DRONE_SECRETS
        conversionStrategy: Default # ArgoCD sync issue
