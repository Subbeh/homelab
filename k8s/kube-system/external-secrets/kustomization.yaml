---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: external-secrets
  repo: https://charts.external-secrets.io
  releaseName: external-secrets
  version: 0.8.1
  namespace: kube-system
  valuesFile: values.yaml
  valuesInline:
    operator:
      create: true
  includeCRDs: true

generators:
  - secret-generator.yaml

resources:
  - secret-store.yaml
