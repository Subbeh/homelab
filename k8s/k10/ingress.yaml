apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: k10
  namespace: kasten-io
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`k10.k8s.sbbh.cloud`)
      services:
        - name: gateway
          port: 8000
